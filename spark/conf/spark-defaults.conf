# =============================================================================
# spark-defaults.conf
# Configuración por defecto para todos los jobs de Spark del proyecto.
# Montado en /opt/bitnami/spark/conf/ en master y worker.
# =============================================================================

# --- Integración con Hive ---
spark.sql.catalogImplementation         hive
spark.sql.warehouse.dir                 /opt/hive/data/warehouse
spark.hadoop.hive.metastore.uris        thrift://hive-metastore:9083

# --- Conectores JDBC (para leer directo de Postgres del Proyecto 1) ---
# El JAR del driver Postgres debe estar disponible en el classpath del job.
# Incluirlo al hacer spark-submit con --jars o en spark.jars.
spark.jars.packages                     org.postgresql:postgresql:42.7.3

# --- Conectores MongoDB (para leer directo de MongoDB del Proyecto 1) ---
spark.jars.packages                     org.mongodb.spark:mongo-spark-connector_2.12:10.3.0

# --- Rendimiento ---
spark.sql.adaptive.enabled              true
spark.sql.adaptive.coalescePartitions.enabled true
spark.serializer                        org.apache.spark.serializer.KryoSerializer

# --- Logs (reducir verbosidad en desarrollo) ---
spark.eventLog.enabled                  false
